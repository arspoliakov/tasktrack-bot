name: tasktrack-bot

services:
  app:
    build: .
    container_name: tasktrack-bot-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${APP_PORT:-8010}:8000"

  postgres:
    image: postgres:16-alpine
    container_name: tasktrack-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasktrack}
      POSTGRES_USER: ${POSTGRES_USER:-tasktrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
